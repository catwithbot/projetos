<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClinicaOS – Agendamentos</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon"><i class="fas fa-heartbeat"></i></div>
        <span class="sidebar-logo-text">ClinicaOS</span>
      </div>
      <div class="sidebar-user" id="sidebarUser"></div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item">
          <i class="fas fa-chart-line"></i><span>Dashboard</span>
        </a>
        <a href="appointments.html" class="nav-item active">
          <i class="fas fa-calendar-alt"></i><span>Agendamentos</span>
        </a>
        <a href="patients.html" class="nav-item">
          <i class="fas fa-user-injured"></i><span>Pacientes</span>
        </a>
        <a href="doctors.html" class="nav-item">
          <i class="fas fa-user-md"></i><span>Médicos</span>
        </a>
        <a href="reports.html" class="nav-item">
          <i class="fas fa-chart-bar"></i><span>Relatórios</span>
        </a>
        <a href="users.html" class="nav-item" id="navUsers" style="display:none">
          <i class="fas fa-users-cog"></i><span>Usuários</span>
        </a>
        <a href="units.html" class="nav-item" id="navUnits" style="display:none">
          <i class="fas fa-building"></i><span>Unidades</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle" title="Alternar tema">
          <i class="fas fa-moon" id="themeIcon"></i>
        </button>
        <button class="btn-logout" id="btnLogout" title="Sair">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <h1 class="page-title"><i class="fas fa-calendar-alt"></i> Agendamentos</h1>
        <div class="topbar-actions">
          <div class="view-toggle">
            <button class="btn btn-sm btn-secondary active" id="btnListView">
              <i class="fas fa-list"></i> Lista
            </button>
            <button class="btn btn-sm btn-secondary" id="btnCalendarView">
              <i class="fas fa-calendar"></i> Calendário
            </button>
          </div>
          <button class="btn btn-primary" id="btnNewAppointment">
            <i class="fas fa-plus"></i> Novo Agendamento
          </button>
        </div>
      </header>

      <!-- Calendário -->
      <section class="card" id="calendarView" style="display:none">
        <div class="calendar-toolbar">
          <div class="calendar-filter">
            <i class="fas fa-user-md"></i>
            <select id="calendarDoctorFilter">
              <option value="">Todos os médicos</option>
            </select>
          </div>
          <div class="calendar-legend" id="calendarLegend" style="display:none">
            <span class="legend-item">
              <span class="legend-dot" style="background:#22c55e;opacity:.45"></span> Disponível
            </span>
            <span class="legend-item">
              <span class="legend-dot" style="background:#2563eb"></span> Agendado
            </span>
          </div>
        </div>
        <div id="fullCalendar"></div>
      </section>

      <!-- Lista -->
      <section class="card" id="listView">
        <div class="card-header">
          <h2><i class="fas fa-list-ul"></i> Lista de Agendamentos</h2>
        </div>
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Data/Hora</th>
                <th>Paciente</th>
                <th>Médico</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="appointmentsBody">
              <tr><td colspan="5" class="empty-msg">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- Modal Novo/Editar Agendamento -->
  <div class="modal-overlay" id="appointmentModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="appointmentModalTitle">Novo Agendamento</h3>
        <button class="modal-close" id="closeAppointmentModal"><i class="fas fa-times"></i></button>
      </div>

      <!-- Tabs (só aparecem na edição) -->
      <div class="modal-tabs" id="appointmentTabs" style="display:none">
        <button class="tab-btn active" data-tab="tabFormPanel">
          <i class="fas fa-edit"></i> Dados
        </button>
        <button class="tab-btn" data-tab="tabAuditPanel">
          <i class="fas fa-history"></i> Histórico
        </button>
      </div>

      <div class="modal-body">

        <!-- Painel Formulário -->
        <div id="tabFormPanel">
          <form id="appointmentForm">
            <input type="hidden" id="appointmentId" />

            <!-- CPF + busca -->
            <div class="form-group" id="cpfGroup">
              <label>CPF do Paciente <span class="required">*</span></label>
              <div class="input-action">
                <input type="text" id="apptCpf" placeholder="000.000.000-00" maxlength="14" />
                <button type="button" class="btn btn-secondary btn-sm" id="btnSearchCpf">
                  <i class="fas fa-search"></i>
                </button>
              </div>
              <span class="field-hint" id="cpfHint"></span>
            </div>

            <!-- Dados do paciente existente -->
            <div id="patientFoundInfo" style="display:none">
              <div class="patient-badge">
                <i class="fas fa-user-check"></i>
                <span id="patientFoundName"></span>
              </div>
            </div>

            <!-- Campos para novo paciente -->
            <div id="newPatientFields" style="display:none">
              <div class="form-group">
                <label>Nome Completo <span class="required">*</span></label>
                <input type="text" id="apptPatientName" placeholder="Nome do paciente" />
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Telefone <span class="required">*</span></label>
                  <input type="text" id="apptPatientPhone" placeholder="(00) 00000-0000" />
                </div>
                <div class="form-group">
                  <label>Data de Nascimento <span class="required">*</span></label>
                  <input type="text" id="apptPatientBirth" placeholder="dd/mm/aaaa" maxlength="10" inputmode="numeric" />
                </div>
              </div>
            </div>

            <!-- Paciente readonly (edição) -->
            <div id="patientReadonly" style="display:none">
              <div class="form-group">
                <label>Paciente</label>
                <input type="text" id="apptPatientReadonly" readonly class="readonly-input" />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label>Médico <span class="required">*</span></label>
                <select id="apptDoctor">
                  <option value="">Selecione...</option>
                </select>
              </div>
              <div class="form-group date-picker-wrap">
                <label>Data <span class="required">*</span></label>
                <input type="text" id="apptDate" placeholder="dd/mm/aaaa" maxlength="10" inputmode="numeric" autocomplete="off" />
                <div class="date-picker-calendar" id="apptDatePicker">
                  <div class="dp-header">
                    <button type="button" class="dp-nav" id="dpPrev"><i class="fas fa-chevron-left"></i></button>
                    <span class="dp-month-year" id="dpMonthYear"></span>
                    <button type="button" class="dp-nav" id="dpNext"><i class="fas fa-chevron-right"></i></button>
                  </div>
                  <div class="dp-weekdays">
                    <span>D</span><span>S</span><span>T</span><span>Q</span><span>Q</span><span>S</span><span>S</span>
                  </div>
                  <div class="dp-days" id="dpDays"></div>
                </div>
              </div>
            </div>

            <!-- Horários disponíveis (aparece após selecionar data) -->
            <div class="form-group time-slot-group" id="timeSlotGroup" style="display:none">
              <label>Horário <span class="required">*</span></label>
              <input type="hidden" id="apptTime" />
              <div class="time-slots-grid" id="timeSlotsGrid"></div>
            </div>

            <div class="form-group">
              <label>Observações</label>
              <textarea id="apptNotes" rows="2" placeholder="Informações adicionais..."></textarea>
            </div>

            <div class="modal-actions">
              <button type="button" class="btn btn-danger" id="btnDeleteAppointment" style="display:none">
                <i class="fas fa-trash"></i> Excluir
              </button>
              <button type="button" class="btn btn-secondary" id="cancelAppointmentModal">Cancelar</button>
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Salvar
              </button>
            </div>
          </form>
        </div>

        <!-- Painel Histórico/Auditoria -->
        <div id="tabAuditPanel" style="display:none">
          <div class="audit-info">
            <div class="audit-row">
              <div class="audit-icon audit-created">
                <i class="fas fa-user-plus"></i>
              </div>
              <div class="audit-detail">
                <span class="audit-label">Criado por</span>
                <span class="audit-user" id="auditCreatedBy">–</span>
                <span class="audit-date" id="auditCreatedAt">–</span>
              </div>
            </div>
            <div class="audit-divider"></div>
            <div class="audit-row">
              <div class="audit-icon audit-updated">
                <i class="fas fa-user-edit"></i>
              </div>
              <div class="audit-detail">
                <span class="audit-label">Última alteração por</span>
                <span class="audit-user" id="auditUpdatedBy">–</span>
                <span class="audit-date" id="auditUpdatedAt">–</span>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.11/locales-all.global.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/appointments.js"></script>
</body>
</html>
