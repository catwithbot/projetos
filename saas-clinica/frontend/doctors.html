<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClinicaOS – Médicos</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon"><i class="fas fa-heartbeat"></i></div>
        <span class="sidebar-logo-text">ClinicaOS</span>
      </div>
      <div class="sidebar-user" id="sidebarUser"></div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item">
          <i class="fas fa-chart-line"></i><span>Dashboard</span>
        </a>
        <a href="appointments.html" class="nav-item">
          <i class="fas fa-calendar-alt"></i><span>Agendamentos</span>
        </a>
        <a href="patients.html" class="nav-item">
          <i class="fas fa-user-injured"></i><span>Pacientes</span>
        </a>
        <a href="doctors.html" class="nav-item active">
          <i class="fas fa-user-md"></i><span>Médicos</span>
        </a>
        <a href="reports.html" class="nav-item">
          <i class="fas fa-chart-bar"></i><span>Relatórios</span>
        </a>
        <a href="users.html" class="nav-item" id="navUsers" style="display:none">
          <i class="fas fa-users-cog"></i><span>Usuários</span>
        </a>
        <a href="units.html" class="nav-item" id="navUnits" style="display:none">
          <i class="fas fa-building"></i><span>Unidades</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle" title="Alternar tema">
          <i class="fas fa-moon" id="themeIcon"></i>
        </button>
        <button class="btn-logout" id="btnLogout" title="Sair">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <h1 class="page-title"><i class="fas fa-user-md"></i> Médicos</h1>
        <button class="btn btn-primary" id="btnNewDoctor">
          <i class="fas fa-plus"></i> Novo Médico
        </button>
      </header>

      <section class="card">
        <div class="card-header">
          <h2><i class="fas fa-list"></i> Cadastro de Médicos</h2>
        </div>
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Nome</th>
                <th>Especialidade</th>
                <th>E-mail</th>
                <th>Telefone</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="doctorsBody">
              <tr><td colspan="7" class="empty-msg">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- Modal Médico -->
  <div class="modal-overlay" id="doctorModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="doctorModalTitle">Novo Médico</h3>
        <button class="modal-close" id="closeDoctorModal"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <form id="doctorForm">
          <input type="hidden" id="doctorId" />
          <div class="form-group">
            <label>Nome Completo <span class="required">*</span></label>
            <input type="text" id="doctorName" placeholder="Dr. Nome Sobrenome" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Especialidade</label>
              <input type="text" id="doctorSpecialty" placeholder="Ex: Cardiologia" />
            </div>
            <div class="form-group">
              <label>Telefone</label>
              <input type="text" id="doctorPhone" placeholder="(00) 00000-0000" />
            </div>
          </div>
          <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="doctorEmail" placeholder="medico@clinica.com" />
          </div>
          <div class="form-group" id="doctorActiveGroup" style="display:none">
            <label class="checkbox-label">
              <input type="checkbox" id="doctorActive" checked />
              <span>Médico ativo</span>
            </label>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" id="cancelDoctorModal">Cancelar</button>
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-save"></i> Salvar
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Modal Agenda do Médico -->
  <div class="modal-overlay" id="scheduleModal">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h3 id="scheduleModalTitle">Agenda do Médico</h3>
        <button class="modal-close" id="closeScheduleModal"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">

        <!-- Intervalo de atendimento -->
        <div class="interval-bar">
          <i class="fas fa-clock"></i>
          <label for="doctorInterval">Intervalo de agendamento:</label>
          <select id="doctorInterval">
            <option value="10">10 minutos</option>
            <option value="15">15 minutos</option>
            <option value="20">20 minutos</option>
            <option value="30" selected>30 minutos</option>
            <option value="45">45 minutos</option>
            <option value="60">1 hora</option>
          </select>
          <button type="button" class="btn btn-sm btn-secondary" id="btnSaveInterval">
            <i class="fas fa-save"></i> Salvar
          </button>
        </div>

        <form id="availabilityForm" class="availability-form">
          <div class="form-row">
            <div class="form-group">
              <label>Data <span class="required">*</span></label>
              <input type="date" id="availDate" />
            </div>
            <div class="form-group">
              <label>Hora Início <span class="required">*</span></label>
              <input type="time" id="availStart" />
            </div>
            <div class="form-group">
              <label>Hora Fim <span class="required">*</span></label>
              <input type="time" id="availEnd" />
            </div>
            <div class="form-group form-group-btn">
              <label>&nbsp;</label>
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-plus"></i> Adicionar
              </button>
            </div>
          </div>
        </form>

        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Data</th>
                <th>Início</th>
                <th>Fim</th>
                <th>Ação</th>
              </tr>
            </thead>
            <tbody id="availabilityBody">
              <tr><td colspan="4" class="empty-msg">Nenhuma disponibilidade cadastrada.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/doctors.js"></script>
</body>
</html>
