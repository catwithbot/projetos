<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClinicaOS – Usuários</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon"><i class="fas fa-heartbeat"></i></div>
        <span class="sidebar-logo-text">ClinicaOS</span>
      </div>
      <div class="sidebar-user" id="sidebarUser"></div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item">
          <i class="fas fa-chart-line"></i><span>Dashboard</span>
        </a>
        <a href="appointments.html" class="nav-item">
          <i class="fas fa-calendar-alt"></i><span>Agendamentos</span>
        </a>
        <a href="patients.html" class="nav-item">
          <i class="fas fa-user-injured"></i><span>Pacientes</span>
        </a>
        <a href="doctors.html" class="nav-item">
          <i class="fas fa-user-md"></i><span>Médicos</span>
        </a>
        <a href="reports.html" class="nav-item">
          <i class="fas fa-chart-bar"></i><span>Relatórios</span>
        </a>
        <a href="users.html" class="nav-item active" id="navUsers" style="display:none">
          <i class="fas fa-users-cog"></i><span>Usuários</span>
        </a>
        <a href="units.html" class="nav-item" id="navUnits" style="display:none">
          <i class="fas fa-building"></i><span>Unidades</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle" title="Alternar tema">
          <i class="fas fa-moon" id="themeIcon"></i>
        </button>
        <button class="btn-logout" id="btnLogout" title="Sair">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <h1 class="page-title"><i class="fas fa-users-cog"></i> Usuários</h1>
        <button class="btn btn-primary" id="btnNewUser">
          <i class="fas fa-plus"></i> Novo Usuário
        </button>
      </header>

      <section class="card">
        <div class="card-header">
          <h2><i class="fas fa-list"></i> Controle de Acesso</h2>
        </div>
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Perfil</th>
                <th>Unidade</th>
                <th>Status</th>
                <th>Cadastro</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="usersBody">
              <tr><td colspan="7" class="empty-msg">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- Modal Usuário -->
  <div class="modal-overlay" id="userModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="userModalTitle">Novo Usuário</h3>
        <button class="modal-close" id="closeUserModal"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <form id="userForm">
          <input type="hidden" id="userId" />
          <div class="form-group">
            <label>Nome Completo <span class="required">*</span></label>
            <input type="text" id="userName" placeholder="Nome do usuário" />
          </div>
          <div class="form-group">
            <label>E-mail <span class="required">*</span></label>
            <input type="email" id="userEmail" placeholder="usuario@clinica.com" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Perfil <span class="required">*</span></label>
              <select id="userRole">
                <option value="recepcao">Recepção</option>
                <option value="medico">Médico</option>
                <option value="unit_admin">Admin de Unidade</option>
                <option value="admin">Super Administrador</option>
              </select>
            </div>
            <div class="form-group" id="userActiveGroup" style="display:none">
              <label>Status</label>
              <select id="userActive">
                <option value="true">Ativo</option>
                <option value="false">Inativo</option>
              </select>
            </div>
          </div>
          <!-- Campo unidade: visível apenas para admin ao criar unit_admin/recepcao/medico -->
          <div class="form-group" id="userUnitGroup" style="display:none">
            <label>Unidade <span class="required">*</span></label>
            <select id="userUnit">
              <option value="">Selecione a unidade...</option>
            </select>
          </div>
          <div class="form-group">
            <label id="passwordLabel">Senha <span class="required">*</span></label>
            <input type="password" id="userPassword" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />
            <span class="field-hint" id="passwordHint"></span>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" id="cancelUserModal">Cancelar</button>
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-save"></i> Salvar
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/users.js"></script>
</body>
</html>
