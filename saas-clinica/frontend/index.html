<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClinicaOS – Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon"><i class="fas fa-heartbeat"></i></div>
        <span class="sidebar-logo-text">ClinicaOS</span>
      </div>
      <div class="sidebar-user" id="sidebarUser"></div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item active">
          <i class="fas fa-chart-line"></i><span>Dashboard</span>
        </a>
        <a href="appointments.html" class="nav-item">
          <i class="fas fa-calendar-alt"></i><span>Agendamentos</span>
        </a>
        <a href="patients.html" class="nav-item">
          <i class="fas fa-user-injured"></i><span>Pacientes</span>
        </a>
        <a href="doctors.html" class="nav-item">
          <i class="fas fa-user-md"></i><span>Médicos</span>
        </a>
        <a href="reports.html" class="nav-item">
          <i class="fas fa-chart-bar"></i><span>Relatórios</span>
        </a>
        <a href="users.html" class="nav-item" id="navUsers" style="display:none">
          <i class="fas fa-users-cog"></i><span>Usuários</span>
        </a>
        <a href="units.html" class="nav-item" id="navUnits" style="display:none">
          <i class="fas fa-building"></i><span>Unidades</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle" title="Alternar tema">
          <i class="fas fa-moon" id="themeIcon"></i>
        </button>
        <button class="btn-logout" id="btnLogout" title="Sair">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content">
      <header class="topbar">
        <h1 class="page-title"><i class="fas fa-chart-line"></i> Dashboard</h1>
        <span class="topbar-date" id="topbarDate"></span>
      </header>

      <!-- Stats cards -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon bg-blue">
            <i class="fas fa-user-injured"></i>
          </div>
          <div class="stat-info">
            <span class="stat-label">Total de Pacientes</span>
            <span class="stat-value" id="totalPatients">–</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon bg-green">
            <i class="fas fa-calendar-check"></i>
          </div>
          <div class="stat-info">
            <span class="stat-label">Consultas Hoje</span>
            <span class="stat-value" id="todayAppointments">–</span>
          </div>
        </div>
      </div>

      <!-- Today's appointments table -->
      <section class="card">
        <div class="card-header">
          <h2><i class="fas fa-list-ul"></i> Consultas de Hoje</h2>
        </div>
        <div class="table-wrapper">
          <table class="data-table" id="todayTable">
            <thead>
              <tr>
                <th>Horário</th>
                <th>Paciente</th>
                <th>Médico</th>
                <th>Especialidade</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="todayBody">
              <tr><td colspan="5" class="empty-msg">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="js/main.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
