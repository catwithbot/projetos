<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClinicaOS – Relatórios</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon"><i class="fas fa-heartbeat"></i></div>
        <span class="sidebar-logo-text">ClinicaOS</span>
      </div>
      <div class="sidebar-user" id="sidebarUser"></div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item">
          <i class="fas fa-chart-line"></i><span>Dashboard</span>
        </a>
        <a href="appointments.html" class="nav-item">
          <i class="fas fa-calendar-alt"></i><span>Agendamentos</span>
        </a>
        <a href="patients.html" class="nav-item">
          <i class="fas fa-user-injured"></i><span>Pacientes</span>
        </a>
        <a href="doctors.html" class="nav-item">
          <i class="fas fa-user-md"></i><span>Médicos</span>
        </a>
        <a href="reports.html" class="nav-item active">
          <i class="fas fa-chart-bar"></i><span>Relatórios</span>
        </a>
        <a href="users.html" class="nav-item" id="navUsers" style="display:none">
          <i class="fas fa-users-cog"></i><span>Usuários</span>
        </a>
        <a href="units.html" class="nav-item" id="navUnits" style="display:none">
          <i class="fas fa-building"></i><span>Unidades</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle" title="Alternar tema">
          <i class="fas fa-moon" id="themeIcon"></i>
        </button>
        <button class="btn-logout" id="btnLogout" title="Sair">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <h1 class="page-title"><i class="fas fa-chart-bar"></i> Relatórios</h1>
      </header>

      <!-- Filtros -->
      <section class="card">
        <div class="card-header">
          <h2><i class="fas fa-filter"></i> Filtros</h2>
          <button class="btn btn-primary btn-sm" id="btnGenerate">
            <i class="fas fa-search"></i> Gerar Relatório
          </button>
        </div>
        <div class="card-body-padded">
          <div class="form-row report-filters">
            <div class="form-group">
              <label>Médico</label>
              <select id="filterDoctor">
                <option value="">Todos os médicos</option>
              </select>
            </div>
            <div class="form-group">
              <label>Data Início</label>
              <input type="date" id="filterDateFrom" />
            </div>
            <div class="form-group">
              <label>Data Fim</label>
              <input type="date" id="filterDateTo" />
            </div>
            <div class="form-group">
              <label>Status</label>
              <select id="filterStatus">
                <option value="">Todos</option>
                <option value="agendado">Agendado</option>
                <option value="concluido">Concluído</option>
                <option value="cancelado">Cancelado</option>
                <option value="falta">Falta</option>
              </select>
            </div>
          </div>
        </div>
      </section>

      <!-- Resumo por médico -->
      <section class="card" id="summarySection" style="display:none">
        <div class="card-header">
          <h2><i class="fas fa-table"></i> Resumo por Médico</h2>
        </div>
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Médico</th>
                <th>Especialidade</th>
                <th>Total</th>
                <th>Agendado</th>
                <th>Concluído</th>
                <th>Cancelado</th>
                <th>Falta</th>
              </tr>
            </thead>
            <tbody id="summaryBody"></tbody>
          </table>
        </div>
      </section>

      <!-- Lista detalhada -->
      <section class="card" id="detailSection" style="display:none">
        <div class="card-header">
          <h2><i class="fas fa-list-ul"></i> Detalhamento</h2>
          <span class="report-count" id="reportCount"></span>
        </div>
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Data/Hora</th>
                <th>Paciente</th>
                <th>Médico</th>
                <th>Status</th>
                <th>Criado por</th>
                <th>Alterado por</th>
              </tr>
            </thead>
            <tbody id="reportBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="js/main.js"></script>
  <script src="js/reports.js"></script>
</body>
</html>
