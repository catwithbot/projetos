<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClinicaOS – Pacientes</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon"><i class="fas fa-heartbeat"></i></div>
        <span class="sidebar-logo-text">ClinicaOS</span>
      </div>
      <div class="sidebar-user" id="sidebarUser"></div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item">
          <i class="fas fa-chart-line"></i><span>Dashboard</span>
        </a>
        <a href="appointments.html" class="nav-item">
          <i class="fas fa-calendar-alt"></i><span>Agendamentos</span>
        </a>
        <a href="patients.html" class="nav-item active">
          <i class="fas fa-user-injured"></i><span>Pacientes</span>
        </a>
        <a href="doctors.html" class="nav-item">
          <i class="fas fa-user-md"></i><span>Médicos</span>
        </a>
        <a href="reports.html" class="nav-item">
          <i class="fas fa-chart-bar"></i><span>Relatórios</span>
        </a>
        <a href="users.html" class="nav-item" id="navUsers" style="display:none">
          <i class="fas fa-users-cog"></i><span>Usuários</span>
        </a>
        <a href="units.html" class="nav-item" id="navUnits" style="display:none">
          <i class="fas fa-building"></i><span>Unidades</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle" title="Alternar tema">
          <i class="fas fa-moon" id="themeIcon"></i>
        </button>
        <button class="btn-logout" id="btnLogout" title="Sair">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <h1 class="page-title"><i class="fas fa-user-injured"></i> Pacientes</h1>
        <button class="btn btn-primary" id="btnNewPatient">
          <i class="fas fa-plus"></i> Novo Paciente
        </button>
      </header>

      <section class="card">
        <div class="card-header">
          <h2><i class="fas fa-list"></i> Cadastro de Pacientes</h2>
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchPatient" placeholder="Buscar por nome ou CPF..." />
          </div>
        </div>
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Nome</th>
                <th>CPF</th>
                <th>E-mail</th>
                <th>Telefone</th>
                <th>Data Nasc.</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="patientsBody">
              <tr><td colspan="7" class="empty-msg">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- Modal Paciente -->
  <div class="modal-overlay" id="patientModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="patientModalTitle">Novo Paciente</h3>
        <button class="modal-close" id="closePatientModal"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <form id="patientForm">
          <input type="hidden" id="patientId" />
          <div class="form-row">
            <div class="form-group">
              <label>CPF <span class="required">*</span></label>
              <input type="text" id="patientCpf" placeholder="000.000.000-00" maxlength="14" />
            </div>
            <div class="form-group">
              <label>Data de Nascimento <span class="required">*</span></label>
              <input type="text" id="patientBirthDate" placeholder="dd/mm/aaaa" maxlength="10" inputmode="numeric" />
            </div>
          </div>
          <div class="form-group">
            <label>Nome Completo <span class="required">*</span></label>
            <input type="text" id="patientName" placeholder="Nome do paciente" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>E-mail</label>
              <input type="email" id="patientEmail" placeholder="email@exemplo.com" />
            </div>
            <div class="form-group">
              <label>Telefone <span class="required">*</span></label>
              <input type="text" id="patientPhone" placeholder="(00) 00000-0000" />
            </div>
          </div>
          <div class="form-group">
            <label>Observações</label>
            <textarea id="patientObs" rows="3" placeholder="Alergias, condições especiais..."></textarea>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" id="cancelPatientModal">Cancelar</button>
            <button type="submit" class="btn btn-primary">
              <i class="fas fa-save"></i> Salvar
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/patients.js"></script>
</body>
</html>
