<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutomaticoZap — Agenda Médica</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-header">
    <div class="header-left">
      <div class="header-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 7V3M16 7V3M7 11H17M5 21H19C20.1046 21 21 20.1046 21 19V7C21 5.89543 20.1046 5 19 5H5C3.89543 5 3 5.89543 3 7V19C3 20.1046 3.89543 21 5 21Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <h1>Agenda Médica</h1>
        <span class="header-subtitle">AutomaticoZap</span>
      </div>
    </div>
    <div class="header-controls">
      <div class="filter-wrapper">
        <label for="filtro-doutor" class="sr-only">Filtrar por médico</label>
        <svg class="filter-icon" width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M3 6H21M6 12H18M10 18H14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <select id="filtro-doutor">
          <option value="">Todos os médicos</option>
        </select>
      </div>
      <div class="import-wrapper">
        <select id="import-dias">
          <option value="7">7 dias</option>
          <option value="15">15 dias</option>
          <option value="30" selected>30 dias</option>
          <option value="60">60 dias</option>
          <option value="90">90 dias</option>
        </select>
        <button id="btn-importar" class="btn btn-secondary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M12 15V3M12 15L8 11M12 15L16 11M3 19H21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Importar histórico
        </button>
      </div>
      <button id="btn-export-ics" class="btn btn-secondary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M12 3V15M12 15L8 11M12 15L16 11M3 19H21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Exportar .ICS
      </button>
      <span id="status-update" class="status-badge">Carregando...</span>
    </div>
  </header>

  <nav class="week-nav">
    <button id="prev-week" class="nav-btn" title="Semana anterior">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="week-info">
      <button id="btn-today" class="btn-today">Hoje</button>
      <span id="week-label">Semana de — a —</span>
    </div>
    <button id="next-week" class="nav-btn" title="Próxima semana">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </nav>

  <main>
    <div id="agenda-grid" class="agenda-grid"></div>
    <div id="empty-state" class="empty-state hidden">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none">
        <path d="M8 7V3M16 7V3M7 11H17M5 21H19C20.1046 21 21 20.1046 21 19V7C21 5.89543 20.1046 5 19 5H5C3.89543 5 3 5.89543 3 7V19C3 20.1046 3.89543 21 5 21Z" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p>Nenhum evento nesta semana</p>
      <small>Eventos são adicionados automaticamente quando mensagens chegam no grupo monitorado</small>
    </div>
  </main>

  <!-- Modal de edição -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">Editar Evento</h2>
        <button class="modal-close" id="modal-close" aria-label="Fechar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="field-group">
          <label for="edit-doutor">Médico</label>
          <input id="edit-doutor" type="text" placeholder="Nome do médico">
        </div>
        <div class="field-row">
          <div class="field-group">
            <label for="edit-data">Data</label>
            <input id="edit-data" type="text" placeholder="DD/MM/YYYY">
          </div>
          <div class="field-group">
            <label for="edit-horario">Horário</label>
            <input id="edit-horario" type="text" placeholder="HH:MM">
          </div>
        </div>
        <div class="field-group">
          <label for="edit-tipo">Tipo</label>
          <input id="edit-tipo" type="text" placeholder="Consulta, Retorno, Cirurgia...">
        </div>
        <div class="field-group">
          <label for="edit-obs">Observações</label>
          <textarea id="edit-obs" rows="3" placeholder="Informações adicionais (opcional)"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button id="modal-cancel" class="btn btn-ghost">Cancelar</button>
        <button id="modal-save" class="btn btn-primary">Salvar alterações</button>
      </div>
    </div>
  </div>

  <!-- Toast de notificação -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
