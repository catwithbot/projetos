<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Clínica - Pacientes</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon"><i class="fas fa-stethoscope"></i></div>
            CliniCare
        </div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fas fa-home"></i> Dashboard</a></li>
            <li class="active"><a href="patients.html"><i class="fas fa-users"></i> Pacientes</a></li>
            <li><a href="doctors.html"><i class="fas fa-user-md"></i> Médicos & Agenda</a></li>
            <li><a href="appointments.html"><i class="fas fa-calendar-check"></i> Consultas</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <h1>Gestão de Pacientes</h1>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <button class="btn-icon-only" onclick="toggleTheme()" title="Alternar Tema">
                    <i id="theme-icon" class="fas fa-moon"></i>
                </button>
                <button class="btn btn-primary" onclick="window.pts.openCreateModal()"><i class="fas fa-plus"></i> Novo Paciente</button>
            </div>
        </header>

        <div class="panel">
            <div class="panel-header">
                <h2>Todos os Pacientes</h2>
                <!-- Search input can go here in future -->
            </div>
            <div style="padding: 0; overflow-x: auto;">
                <table id="patients-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>CPF</th>
                            <th>Contato</th>
                            <th>Data Nac.</th>
                            <th style="text-align: right;">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="5" style="text-align: center; padding: 2rem;">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal for Create/Edit Patient -->
    <div class="modal-backdrop" id="patient-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Novo Paciente</h3>
                <button class="modal-close" onclick="hideModal('patient-modal')"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="patient-form">
                    <input type="hidden" id="pt-id">
                    <div style="display: flex; gap: 1rem;">
                        <div class="form-group" style="flex: 1;">
                            <label>CPF *</label>
                            <input type="text" id="pt-cpf" class="form-control" required placeholder="000.000.000-00" maxlength="14" oninput="window.pts.maskCpf(this)">
                        </div>
                        <div class="form-group" style="flex: 2;">
                            <label>Nome Completo *</label>
                            <input type="text" id="pt-name" class="form-control" required placeholder="Ex: João da Silva">
                        </div>
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <div class="form-group" style="flex: 1;">
                            <label>Telefone *</label>
                            <input type="text" id="pt-phone" class="form-control" required placeholder="(11) 99999-9999">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Data de Nascimento *</label>
                            <input type="date" id="pt-dob" class="form-control" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="pt-email" class="form-control" placeholder="joao@email.com">
                    </div>
                    <div class="form-group">
                        <label>Prontuário / Observações</label>
                        <textarea id="pt-notes" class="form-control" placeholder="Histórico, alergias, etc..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="hideModal('patient-modal')">Cancelar</button>
                <button class="btn btn-primary" onclick="window.pts.savePatient()">Salvar Paciente</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/patients.js"></script>
</body>
</html>
