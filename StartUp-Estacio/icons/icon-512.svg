<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Maskable icon — content lives inside the "safe zone" (80% = 409x409,
    centred), so Android adaptive icons can apply any mask shape.
    Background fills full canvas as required.
  -->

  <!-- Full background (maskable) -->
  <rect width="512" height="512" fill="#1D9E75"/>

  <!-- Soft radial glow for depth -->
  <radialGradient id="glow512" cx="42%" cy="38%" r="55%">
    <stop offset="0%"   stop-color="#2BC48F" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#167A5A" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" fill="url(#glow512)"/>

  <!-- Decorative rings (inside safe zone) -->
  <circle cx="256" cy="256" r="184" fill="none" stroke="white" stroke-opacity="0.10" stroke-width="2"/>
  <circle cx="256" cy="256" r="152" fill="none" stroke="white" stroke-opacity="0.07" stroke-width="1.5"/>

  <!-- Centre card / container -->
  <rect x="116" y="116" width="280" height="280" rx="48" fill="white" fill-opacity="0.10"/>

  <!-- Heart / care symbol — scaled for 512 canvas, inside safe zone -->
  <g transform="translate(90, 90) scale(13.8)">
    <path
      d="M12 21.5C7.5 18 2 14 2 8.5A5 5 0 0 1 7 3.5C9 3.5 10.8 4.5 12 6.2C13.2 4.5 15 3.5 17 3.5A5 5 0 0 1 22 8.5C22 14 16.5 18 12 21.5Z"
      fill="white"
      fill-opacity="0.95"
    />
  </g>

  <!-- Wordmark "AcolheMais" — bottom of safe zone -->
  <text x="256" y="408" font-family="system-ui, -apple-system, sans-serif"
        font-size="36" font-weight="800" fill="white" fill-opacity="0.9"
        text-anchor="middle" dominant-baseline="middle" letter-spacing="1">
    AcolheMais
  </text>
</svg>
